GOOSE_PROVIDER: custom_ollama_local
GOOSE_MODEL: qwen3.5:9b
GOOSE_MODE: auto
GOOSE_DISABLE_KEYRING: '1'
GOOSE_TELEMETRY_ENABLED: false
GOOSE_CONTEXT_LIMIT: '32768'
GOOSE_MAX_TOKENS: '1024'
GOOSE_TEMPERATURE: '0.1'
GOOSE_CONTEXT_STRATEGY: summarize
GOOSE_AUTO_COMPACT_THRESHOLD: '0.55'
GOOSE_MAX_TURNS: '8'
CONTEXT_FILE_NAMES:
  - .local-tiny-context
extensions:
  extensionmanager:
    enabled: false
    type: platform
    name: Extension Manager
    description: Enable extension management tools for discovering, enabling, and disabling extensions
    display_name: Extension Manager
    bundled: true
    available_tools: []
  todo:
    enabled: false
    type: platform
    name: todo
    description: Enable a todo list for goose so it can keep track of what it is doing
    display_name: Todo
    bundled: true
    available_tools: []
  developer:
    enabled: false
    type: builtin
    name: developer
    description: Write and edit files, and execute shell commands
    display_name: Developer
    timeout: null
    bundled: true
    available_tools: []
  computercontroller:
    enabled: false
    type: builtin
    name: computercontroller
    description: General computer control tools that don't require you to be a developer or engineer.
    display_name: Computer Controller
    timeout: 300
    bundled: true
    available_tools: []
  autovisualiser:
    enabled: false
    type: builtin
    name: autovisualiser
    description: Data visualization and UI generation tools
    display_name: Auto Visualiser
    timeout: 300
    bundled: true
    available_tools: []
  memory:
    enabled: false
    type: builtin
    name: memory
    description: Teach goose your preferences as you go.
    display_name: Memory
    timeout: 300
    bundled: true
    available_tools: []
  code_execution:
    enabled: false
    type: platform
    name: code_execution
    description: Goose will make extension calls through code execution, saving tokens
    display_name: Code Mode
    bundled: true
    available_tools: []
  chatrecall:
    enabled: false
    type: platform
    name: chatrecall
    description: Search past conversations and load session summaries for contextual memory
    display_name: Chat Recall
    bundled: true
    available_tools: []
  apps:
    enabled: false
    type: platform
    name: apps
    description: Create and manage custom Goose apps through chat. Apps are HTML/CSS/JavaScript and run in sandboxed windows.
    display_name: Apps
    bundled: true
    available_tools: []
  summon:
    enabled: false
    type: platform
    name: summon
    description: Load knowledge and delegate tasks to subagents
    display_name: Summon
    bundled: true
    available_tools: []
  tom:
    enabled: false
    type: platform
    name: tom
    description: Inject custom context into every turn via GOOSE_MOIM_MESSAGE_TEXT and GOOSE_MOIM_MESSAGE_FILE environment variables
    display_name: Top Of Mind
    bundled: true
    available_tools: []
  local-tiny-tools:
    enabled: true
    type: stdio
    name: local-tiny-tools
    description: Local Tiny Agent tools for fetching allowed local URLs and running whitelisted local commands
    cmd: config/mcp/local-tiny-tools/.venv/bin/python
    args:
    - config/mcp/local-tiny-tools/server.py
    envs:
      LOCAL_TINY_ALLOWED_HOSTS: localhost,127.0.0.1
      LOCAL_TINY_COMMAND_TIMEOUT_MS: '5000'
      LOCAL_TINY_MAX_OUTPUT_BYTES: '65536'
      LOCAL_TINY_FETCH_TIMEOUT_MS: '8000'
      LOCAL_TINY_FETCH_MAX_BYTES: '65536'
    env_keys: []
    timeout: 30
    bundled: null
    available_tools: []
  analyze:
    enabled: false
    type: platform
    name: analyze
    description: 'Analyze code structure with tree-sitter: directory overviews, file details, symbol call graphs'
    display_name: Analyze
    bundled: true
    available_tools: []
  summarize:
    enabled: false
    type: platform
    name: summarize
    description: Load files/directories and get an LLM summary in a single call
    display_name: Summarize
    bundled: true
    available_tools: []
  orchestrator:
    enabled: false
    type: platform
    name: orchestrator
    description: 'Manage agent sessions: list, view, start, send messages, interrupt, and stop agents'
    display_name: Orchestrator
    bundled: true
    available_tools: []
  skills:
    enabled: false
    type: platform
    name: skills
    description: Discover and provide skill instructions from filesystem and builtins
    display_name: Skills
    bundled: true
    available_tools: []
